{% extends 'base.html' %}
{% block title %}Predict - SmartLender{% endblock %}
{% block content %}
<h1>🎯 Loan Prediction</h1>
<p>Fill in the applicant details to get a loan prediction.</p>

<form method="POST" action="/predict">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="form-group">
            <label>Gender</label>
            <select name="Gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Marital Status</label>
            <select name="Married" required>
                <option value="">Select</option>
                <option value="Yes">Married</option>
                <option value="No">Single</option>
            </select>
        </div>

        <div class="form-group">
            <label>Dependents</label>
            <select name="Dependents" required>
                <option value="">Select</option>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3+">3+</option>
            </select>
        </div>

        <div class="form-group">
            <label>Education</label>
            <select name="Education" required>
                <option value="">Select</option>
                <option value="Graduate">Graduate</option>
                <option value="Not Graduate">Not Graduate</option>
            </select>
        </div>

        <div class="form-group">
            <label>Self Employed</label>
            <select name="Self_Employed" required>
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Applicant Income ($)</label>
            <input type="number" name="ApplicantIncome" min="0" required>
        </div>

        <div class="form-group">
            <label>Coapplicant Income ($)</label>
            <input type="number" name="CoapplicantIncome" min="0" required>
        </div>

        <div class="form-group">
            <label>Loan Amount ($)</label>
            <input type="number" name="LoanAmount" min="0" required>
        </div>

        <div class="form-group">
            <label>Loan Amount Term (days)</label>
            <input type="number" name="Loan_Amount_Term" min="1" value="360" required>
        </div>

        <div class="form-group">
            <label>Credit History</label>
            <select name="Credit_History" required>
                <option value="">Select</option>
                <option value="1">Good</option>
                <option value="0">Poor</option>
            </select>
        </div>

        <div class="form-group">
            <label>Property Area</label>
            <select name="Property_Area" required>
                <option value="">Select</option>
                <option value="Urban">Urban</option>
                <option value="Semiurban">Semi-Urban</option>
                <option value="Rural">Rural</option>
            </select>
        </div>
    </div>

    <div class="form-group" style="margin-top: 20px;">
        <label>Model</label>
        <select name="model_name">
            <option value="XGBoost">XGBoost ({{ model_info.accuracy }})</option>
        </select>
    </div>

    <button type="submit" style="width: 100%; padding: 15px; font-size: 16px; margin-top: 20px;">Predict</button>
</form>
{% endblock %}
